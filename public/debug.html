<!DOCTYPE html>
<html>
<head>
    <title>Debug Motor de Búsqueda</title>
</head>
<body>
    <h1>Debug Motor de Búsqueda</h1>
    
    <h2>1. Probar APIs</h2>
    <button onclick="testCategoriesAPI()">Test /api/categories</button>
    <button onclick="testItemsAPI()">Test /api/items/nosotros</button>
    
    <h2>2. Forzar Reindexación</h2>
    <button onclick="reindexSearch()">Reindexar Motor de Búsqueda</button>
    
    <h2>3. Buscar Contenido</h2>
    <input type="text" id="searchQuery" placeholder="Escribe tu búsqueda..." value="quienes somos">
    <button onclick="testSearch()">Buscar</button>
    
    <div id="results" style="margin-top: 20px; padding: 20px; border: 1px solid #ccc;"></div>

    <script>
        async function testCategoriesAPI() {
            try {
                const response = await fetch('/api/categories');
                const data = await response.json();
                document.getElementById('results').innerHTML = `
                    <h3>Categorías:</h3>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
                console.log('Categorías:', data);
            } catch (error) {
                document.getElementById('results').innerHTML = `Error: ${error.message}`;
            }
        }

        async function testItemsAPI() {
            try {
                const response = await fetch('/api/items/nosotros');
                const data = await response.json();
                document.getElementById('results').innerHTML = `
                    <h3>Items de Nosotros:</h3>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
                console.log('Items nosotros:', data);
            } catch (error) {
                document.getElementById('results').innerHTML = `Error: ${error.message}`;
            }
        }

        async function reindexSearch() {
            // Disparar evento de reindexación
            window.dispatchEvent(new CustomEvent('reindexSearch'));
            document.getElementById('results').innerHTML = `
                <p>✅ Evento de reindexación disparado</p>
                <p>Revisa la consola del navegador para ver los logs</p>
            `;
        }

        async function testSearch() {
            const query = document.getElementById('searchQuery').value;
            
            // Simular búsqueda como lo haría el componente principal
            try {
                // Aquí intentaríamos usar el motor de búsqueda
                document.getElementById('results').innerHTML = `
                    <h3>Búsqueda: "${query}"</h3>
                    <p>Prueba esta búsqueda en la página principal después de la reindexación</p>
                `;
            } catch (error) {
                document.getElementById('results').innerHTML = `Error en búsqueda: ${error.message}`;
            }
        }

        // Auto-test al cargar
        window.onload = () => {
            console.log('=== DEBUG MOTOR DE BÚSQUEDA ===');
            console.log('Página de debug cargada');
        };
    </script>
</body>
</html>
