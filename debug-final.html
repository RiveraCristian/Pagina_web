<!DOCTYPE html>
<html>
<head>
    <title>Debug Final - Paso a Paso</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a1a; color: white; }
        .step { background: #2a2a2a; margin: 10px 0; padding: 15px; border-radius: 5px; }
        button { padding: 10px; margin: 5px; background: #4CAF50; color: white; border: none; cursor: pointer; }
        .result { background: #1e1e1e; padding: 10px; margin: 10px 0; border-radius: 3px; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
        .error { background: #d32f2f; }
        .success { background: #388e3c; }
    </style>
</head>
<body>
    <h1>🔧 Debug Final - Paso a Paso</h1>
    
    <div class="step">
        <h3>Paso 1: Verificar API Raw</h3>
        <button onclick="paso1()">Probar /api/items/nosotros</button>
        <div id="paso1-result" class="result">Esperando...</div>
    </div>

    <div class="step">
        <h3>Paso 2: Crear SearchEngine desde Cero</h3>
        <button onclick="paso2()">Importar y crear SearchEngine nuevo</button>
        <div id="paso2-result" class="result">Esperando...</div>
    </div>

    <div class="step">
        <h3>Paso 3: Indexar Datos Manualmente</h3>
        <button onclick="paso3()">Indexar datos del paso 1</button>
        <div id="paso3-result" class="result">Esperando...</div>
    </div>

    <div class="step">
        <h3>Paso 4: Probar Búsquedas</h3>
        <button onclick="paso4()">Buscar 'nosotros'</button>
        <div id="paso4-result" class="result">Esperando...</div>
    </div>

    <div class="step">
        <h3>Paso 5: Verificar Tokens</h3>
        <button onclick="paso5()">Analizar tokenización</button>
        <div id="paso5-result" class="result">Esperando...</div>
    </div>

    <script type="module">
        let rawData = null;
        let searchEngine = null;

        window.paso1 = async function() {
            const resultEl = document.getElementById('paso1-result');
            resultEl.textContent = 'Cargando API...';
            
            try {
                const response = await fetch('/api/items/nosotros?t=' + Date.now());
                rawData = await response.json();
                
                resultEl.textContent = `✅ API funcionando\n`;
                resultEl.textContent += `Items encontrados: ${rawData.items?.length || 0}\n\n`;
                
                if (rawData.items && rawData.items.length > 0) {
                    const item = rawData.items[0];
                    resultEl.textContent += `Primer item:\n`;
                    resultEl.textContent += `- categoryId: ${item.categoryId}\n`;
                    resultEl.textContent += `- status: ${item.status}\n`;
                    resultEl.textContent += `- título: ${item.data?.titulo}\n`;
                    resultEl.textContent += `- keywords: ${item.data?.keywords}\n\n`;
                    resultEl.textContent += `Contiene 'nosotros'? ${JSON.stringify(item).toLowerCase().includes('nosotros') ? 'SÍ' : 'NO'}\n`;
                }
                
                resultEl.className = 'result success';
            } catch (error) {
                resultEl.textContent = `❌ Error: ${error.message}`;
                resultEl.className = 'result error';
            }
        };

        window.paso2 = async function() {
            const resultEl = document.getElementById('paso2-result');
            resultEl.textContent = 'Importando SearchEngine...';
            
            try {
                const module = await import('./src/services/searchEngine.js');
                searchEngine = module.searchEngine; // Usar la instancia singleton exportada
                
                resultEl.textContent = '✅ SearchEngine importado (singleton)\n';
                resultEl.textContent += `Tipo: ${typeof searchEngine}\n`;
                resultEl.textContent += `Métodos disponibles: ${Object.getOwnPropertyNames(Object.getPrototypeOf(searchEngine)).join(', ')}\n`;
                resultEl.textContent += `Estado actual: ${searchEngine.getIndexSize()} tokens indexados\n`;
                
                // Limpiar índice para empezar desde cero
                searchEngine.clear();
                resultEl.textContent += `Índice limpiado, nuevo tamaño: ${searchEngine.getIndexSize()}\n`;
                
                resultEl.className = 'result success';
            } catch (error) {
                resultEl.textContent = `❌ Error: ${error.message}\n${error.stack}`;
                resultEl.className = 'result error';
            }
        };

        window.paso3 = async function() {
            const resultEl = document.getElementById('paso3-result');
            
            if (!rawData) {
                resultEl.textContent = '❌ Ejecuta Paso 1 primero';
                return;
            }
            
            if (!searchEngine) {
                resultEl.textContent = '❌ Ejecuta Paso 2 primero';
                return;
            }
            
            resultEl.textContent = 'Indexando datos...';
            
            try {
                const items = rawData.items || [];
                
                resultEl.textContent += `\n📦 Datos a indexar: ${items.length} items\n`;
                
                // Mostrar estructura antes de indexar
                items.forEach((item, i) => {
                    resultEl.textContent += `\n${i + 1}. ${item.categoryId} (${item.status})`;
                    resultEl.textContent += `\n   Título: ${item.data?.titulo || 'N/A'}`;
                    resultEl.textContent += `\n   Keywords: ${item.data?.keywords || 'N/A'}`;
                });
                
                // Indexar
                searchEngine.indexContent(items);
                
                const indexSize = searchEngine.getIndexSize();
                resultEl.textContent += `\n\n✅ Indexación completa`;
                resultEl.textContent += `\nTamaño del índice: ${indexSize} tokens`;
                
                // Debug del índice
                if (searchEngine.debugIndex) {
                    const debug = searchEngine.debugIndex();
                    resultEl.textContent += `\n\nDebug del índice:`;
                    resultEl.textContent += `\n- Items indexados: ${debug.contentCount}`;
                    resultEl.textContent += `\n- Tokens únicos: ${debug.tokenCount}`;
                    resultEl.textContent += `\n- Primeros tokens: ${debug.sampleTokens?.join(', ') || 'N/A'}`;
                }
                
                resultEl.className = 'result success';
            } catch (error) {
                resultEl.textContent += `\n❌ Error: ${error.message}\n${error.stack}`;
                resultEl.className = 'result error';
            }
        };

        window.paso4 = async function() {
            const resultEl = document.getElementById('paso4-result');
            
            if (!searchEngine) {
                resultEl.textContent = '❌ Ejecuta pasos anteriores primero';
                return;
            }
            
            resultEl.textContent = 'Probando búsquedas...\n';
            
            try {
                const queries = ['nosotros', 'quienes', 'colabi', 'empresa', 'consultora'];
                
                for (const query of queries) {
                    resultEl.textContent += `\n🔍 Búsqueda: "${query}"\n`;
                    
                    const results = searchEngine.search(query, { limit: 3, threshold: 0.0 });
                    resultEl.textContent += `   Resultados: ${results.length}\n`;
                    
                    results.forEach((result, i) => {
                        const data = result.content.data || result.content;
                        resultEl.textContent += `   ${i+1}. Score: ${result.score.toFixed(3)} - ${data.titulo || 'Sin título'}\n`;
                    });
                }
                
                resultEl.className = 'result success';
            } catch (error) {
                resultEl.textContent += `❌ Error: ${error.message}`;
                resultEl.className = 'result error';
            }
        };

        window.paso5 = async function() {
            const resultEl = document.getElementById('paso5-result');
            resultEl.textContent = 'Analizando tokenización...\n';
            
            try {
                // Simular el proceso de tokenización
                const testText = "Tecnologia, Inteligencia Artificial, nosotros, acerca de nosotros, quienes somos, sobre nosotros, empresa, consultora";
                
                resultEl.textContent += `Texto de prueba: ${testText}\n\n`;
                
                // Paso 1: toLowerCase
                const lower = testText.toLowerCase();
                resultEl.textContent += `1. toLowerCase: ${lower}\n\n`;
                
                // Paso 2: remove punctuation
                const cleaned = lower.replace(/[^\w\sñáéíóúü]/g, ' ');
                resultEl.textContent += `2. Sin puntuación: ${cleaned}\n\n`;
                
                // Paso 3: split
                const split = cleaned.split(/\s+/);
                resultEl.textContent += `3. Split: [${split.join(', ')}]\n\n`;
                
                // Paso 4: filter length > 2
                const filtered = split.filter(token => token.length > 2);
                resultEl.textContent += `4. Filtrados (>2 chars): [${filtered.join(', ')}]\n\n`;
                
                // Verificar si 'nosotros' está ahí
                const hasNosotros = filtered.includes('nosotros');
                resultEl.textContent += `¿Contiene 'nosotros'? ${hasNosotros ? '✅ SÍ' : '❌ NO'}\n`;
                
                if (hasNosotros) {
                    resultEl.className = 'result success';
                } else {
                    resultEl.textContent += `\n🔍 Tokens que contienen 'nos': ${filtered.filter(t => t.includes('nos')).join(', ') || 'Ninguno'}`;
                    resultEl.className = 'result error';
                }
                
            } catch (error) {
                resultEl.textContent += `❌ Error: ${error.message}`;
                resultEl.className = 'result error';
            }
        };

        // Auto-ejecutar paso 1
        setTimeout(() => window.paso1(), 1000);
    </script>
</body>
</html>
